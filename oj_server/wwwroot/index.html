<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>oj系统</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }
        html,
        body{
            width: 100%;
            height: 100%;
        }

        .container .navbar{
            width: 100%;
            height: 50%;
            background-color: black;
            overflow: hidden;
        }

        .container .navbar a{
            display: inline-block;
            width: 80px;
            color: white;
            font-size: large;
            line-height: 50px;
            text-decoration: none;
            text-align: center;
        }

        .container .navbar a:hover{
            background-color: green;
        }

        .container .navbar .login{
            float: right;
        }

        .container .content{
            width: 800px;
            margin: 0px auto;
            text-align: center;
            margin: top 200px;
        }

        .container .content .font{
            display: block;
            margin-top: 20px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <!--导航栏-->
        <div class="navbar">
            <a href="#">首页</a>
            <a href="/all_questions">题库</a>
            <a href="#">竞赛</a>
            <a href="#">讨论</a>
            <a class="login" href="#">登录</a>
        </div>
        <!--网页内容-->
        <div class="content">
            <h1 class="font">刷题小站</h1>
            <p class="font">在线oj平台</p>
            <a class="font" href="/all_questions">点击开始刷题！</a>
        </div>  
    </div>
</body>

</html>
